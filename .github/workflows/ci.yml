name: CI (basic)

on:
  pull_request:
    branches: [dev, tests, main]
  push:
    branches: [dev, tests, 'feature/**', 'hotfix/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- PHP ----------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Prepare .env for SQLite
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env || true
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=database\/database.sqlite/' .env || true
          mkdir -p database && : > database/database.sqlite
          # ensure app key present
          php -r "file_put_contents('.env', preg_replace('/^APP_KEY=.*/m','APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=', file_get_contents('.env')));"

      - name: Install PHP deps
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Key (fallback)
        run: php artisan key:generate || true

      - name: Migrate
        run: php artisan migrate --force

      - name: PHP tests (Pest or PHPUnit)
        run: |
          if [ -f vendor/bin/pest ]; then vendor/bin/pest -q; else php artisan test -q; fi

      # ---------- JS/TS ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node deps
        run: npm ci

      - name: Lint (optional, skip if not defined)
        run: npm run lint --if-present

      - name: Typecheck (optional)
        run: npx tsc --noEmit || true

      - name: Build
        run: npm run build
